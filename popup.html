<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Time Management by O'Neal</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header>
    <h1>Time Management by O'Neal</h1>
    <p>Fall 2026 workflow timer. Local only.</p>
  </header>
  <section class="card">
    <h2>Session setup</h2>
    <label>Mode
      <select id="mode">
        <option value="core">Core timed steps only</option>
        <option value="detailed">Detailed: every step timed</option>
      </select>
    </label>
    <div class="grid">
      <label>Date<input id="manualDate" type="date"></label>
      <label>Hour code<select id="hourCode"></select></label>
      <label>Minute<input id="minute" type="number" min="0" max="59" step="1"></label>
    </div>
    <p class="hint" id="decodedTimeHint">Detected time will appear here.</p>
    <div class="actions">
      <button id="useNow">Use detected current date/time</button>
      <button id="openPage">Open workflow page</button>
      <button id="startSession" class="primary">Start session</button>
    </div>
  </section>
  <section class="card active">
    <h2>Current step</h2>
    <div id="currentStep" class="stepText">No session running.</div>
    <div id="timer" class="timer">00:00:00</div>
    <p id="pauseStatus" class="hint">Timer is running when a session is active.</p>
    <div class="actions">
      <button id="pauseStep">Pause timer</button>
      <button id="finishStep" class="primary">Finish step</button>
      <button id="skipStep">Skip step</button>
      <button id="endSession">End session</button>
    </div>
  </section>
  <section class="card"><h2>Progress</h2><div id="progressList" class="progressList"></div></section>
  <section class="card"><h2>Speed-up notes</h2><div id="suggestions"></div></section>
  <section class="card">
    <h2>Export</h2>
    <textarea id="exportBox" placeholder="Your ChatGPT-ready report will appear here."></textarea>
    <div class="actions">
      <button id="copyChatGPT" class="primary">Copy ChatGPT report</button>
      <button id="downloadJson">Download local JSON</button>
      <button id="resetSession">Reset active session</button>
      <button id="resetConfig">Reset workflow config</button>
    </div>
  </section>
  <script src="popup.js"></script>
</body>
</html>
